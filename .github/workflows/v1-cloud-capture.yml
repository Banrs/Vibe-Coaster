name: V1 cloud capture

on:
  workflow_dispatch:
  push:
    branches:
      - "codex/v1-legacy-fix"
  pull_request:
    paths:
      - "opengl/**"
      - ".github/workflows/v1-cloud-capture.yml"

jobs:
  audit:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install software-rendering dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libasound2-dev libgl1-mesa-dev \
            libx11-dev libxrandr-dev libxi-dev libxinerama-dev libxcursor-dev \
            xvfb mesa-utils librsvg2-bin

      - name: Build restored legacy V1
        run: |
          cmake -S opengl -B opengl/build-cloud -DCMAKE_BUILD_TYPE=Release
          cmake --build opengl/build-cloud --parallel 4

      - name: Run V1 audits
        working-directory: opengl
        run: |
          mkdir -p audit captures
          ctest --test-dir build-cloud --output-on-failure
          ./minecoaster --audit 8
          ./minecoaster --launchaudit > captures/launch-pacing.txt
          ./minecoaster --pacing > captures/ride-pacing.txt
          rsvg-convert -w 2400 audit/seed1.svg -o captures/audit-seed1.png
          rsvg-convert -w 2400 audit/seed2.svg -o captures/audit-seed2.png

      - name: Upload audit screenshots and pacing reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v1-audit-screenshots-and-pacing
          path: |
            opengl/captures/**
            opengl/audit/*.svg
          if-no-files-found: error

  screenshots:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: top-hat
            args: "--elementshot TOPHAT"
          - id: hills
            args: "--elementshot HILLS"
          - id: loop
            args: "--elementshot LOOP"
          - id: into-flat
            args: "--jointshot ANY FLAT"
          - id: out-of-flat
            args: "--jointshot FLAT ANY"
    steps:
      - uses: actions/checkout@v4

      - name: Install software-rendering dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libasound2-dev libgl1-mesa-dev \
            libx11-dev libxrandr-dev libxi-dev libxinerama-dev libxcursor-dev xvfb

      - name: Build restored legacy V1
        run: |
          cmake -S opengl -B opengl/build-cloud -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=OFF
          cmake --build opengl/build-cloud --parallel 4

      - name: Capture ${{ matrix.id }}
        working-directory: opengl
        env:
          LIBGL_ALWAYS_SOFTWARE: "1"
          MESA_GL_VERSION_OVERRIDE: "3.3"
          MESA_GLSL_VERSION_OVERRIDE: "330"
          MC_CAPTURE_FAST: "1"
          MC_CAPTURE_W: "1920"
          MC_CAPTURE_H: "1080"
          MC_DT: "0.05"
          MC_MUTE: "1"
        run: |
          mkdir -p captures
          timeout 360 xvfb-run -a -s "-screen 0 1920x1080x24" ./minecoaster ${{ matrix.args }} captures

      - name: Upload ${{ matrix.id }} screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v1-${{ matrix.id }}-screenshot
          path: opengl/captures/*.png
          if-no-files-found: error
